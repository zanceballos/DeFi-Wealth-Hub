<!doctype html>
<html lang="en-SG">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0F1E" />
    <meta name="color-scheme" content="dark light" />

    <title>DeFi Wealth Hub | Privacy-First AI Financial Dashboard</title>
    <meta
      name="description"
      content="DeFi Wealth Hub is a privacy-first AI financial dashboard for uploading, parsing, and understanding bank, crypto, and investment statements without sharing bank credentials."
    />
    <meta
      name="keywords"
      content="DeFi Wealth Hub, financial dashboard, AI finance, bank statement parser, crypto portfolio dashboard, investment dashboard, privacy-first finance, Firestore, Groq, InternVL"
    />
    <meta name="author" content="DeFi Wealth Hub Team" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://your-domain.com/" />

    <!-- App / PWA -->
    <link rel="icon" type="image/svg+xml" href="/public/DeFi-Logo.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DeFi Wealth Hub" />
    <meta property="og:title" content="DeFi Wealth Hub | Privacy-First AI Financial Dashboard" />
    <meta
      property="og:description"
      content="Upload and review bank, crypto, and investment statements in one secure AI-powered financial dashboard."
    />
    <meta property="og:url" content="https://your-domain.com/" />
    <meta property="og:image" content="https://your-domain.com/og-cover.jpg" />
    <meta property="og:locale" content="en_SG" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DeFi Wealth Hub | Privacy-First AI Financial Dashboard" />
    <meta
      name="twitter:description"
      content="A privacy-first AI financial cockpit for statement uploads, budgeting insights, wellness scoring, and advisory."
    />
    <meta name="twitter:image" content="https://your-domain.com/og-cover.jpg" />

    <!-- Security / privacy hints -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "DeFi Wealth Hub",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://your-domain.com/",
        "description": "A privacy-first AI financial dashboard that helps users upload, parse, understand, and act on bank, crypto, and investment statement data without sharing bank credentials.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "SGD"
        },
        "featureList": [
          "Bank statement uploads",
          "Crypto and investment dashboard",
          "AI-powered wealth advisory",
          "Financial wellness scoring",
          "Privacy visibility hub"
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <noscript>
      DeFi Wealth Hub requires JavaScript to render the dashboard, onboarding, advisory, privacy, and documentation pages.
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
